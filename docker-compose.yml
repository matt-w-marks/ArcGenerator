services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: arcgenerator
    ports:
      - "4432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arcgenerator"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: ./services/auth
    environment:
      PORT: 3001
      DATABASE_URL: ${AUTH_DATABASE_URL}
      LOGGING_DATABASE_URL: ${LOGGING_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  metrics:
    build: ./services/metrics
    environment:
      DATABASE_URL: ${METRICS_DATABASE_URL}
      LOGGING_DATABASE_URL: ${LOGGING_DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  export:
    build: ./services/export
    environment:
      DATABASE_URL: ${METRICS_DATABASE_URL}
      LOGGING_DATABASE_URL: ${LOGGING_DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build: ./gateway
    ports:
      - "4000:3000"
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth:3001
      METRICS_SERVICE_URL: http://metrics:8000
      EXPORT_SERVICE_URL: http://export:8001
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      auth:
        condition: service_healthy
      metrics:
        condition: service_healthy
      export:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "4001:80"
    volumes:
      - ./deploy/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
