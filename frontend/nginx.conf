# Production nginx config for the ArcGenerator frontend.
#
# Serves the Vite static build and reverse-proxies API calls to the
# internal Container Apps gateway. The browser only ever talks to this
# nginx — gateway, auth, metrics, and export are not exposed to the
# internet.
#
# Internal Container Apps endpoints listen on plain HTTP at port 80 —
# the platform terminates TLS at the public edge only.

# DNS resolver for upstream name resolution. Container Apps' internal
# DNS for *.internal.<env>.<region>.azurecontainerapps.io is served by
# Azure's resolver at 168.63.129.16. nginx normally resolves upstream
# names ONCE at startup; with `resolver` and a `set $upstream` variable,
# we force re-resolution at request time.
resolver 168.63.129.16 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers (gateway also applies Helmet; defense in depth)
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "geolocation=()"    always;

    # ── API reverse proxy ──────────────────────────────────────────────────
    # Single regex location handles all API prefixes. Container Apps
    # internal endpoints have allowInsecure=false by default and redirect
    # plain HTTP to HTTPS, so we proxy over HTTPS on port 443 with the
    # SNI/Host headers set to the upstream FQDN.
    location ~ ^/(auth|metrics|export|health)(/|$) {
        set $gateway_upstream "ca-arcforge-gateway.internal.thankfulbush-7b65c96f.westus3.azurecontainerapps.io";
        proxy_pass         https://$gateway_upstream:443$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $gateway_upstream;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_ssl_server_name on;
        proxy_ssl_name     $gateway_upstream;
        proxy_ssl_verify   off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Long-lived cache for hashed static assets ─────────────────────────
    location ~* \.(?:js|css|woff2?|png|svg|ico|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Service worker — never cache so updates are picked up ─────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ──────────────────
    location / {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri /index.html;
    }
}
