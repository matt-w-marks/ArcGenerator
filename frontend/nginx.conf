# Production nginx config for the ArcGenerator frontend.
#
# Serves the Vite static build and reverse-proxies API calls to the
# internal Container Apps gateway. The browser only ever talks to this
# nginx — gateway, auth, metrics, and export are not exposed to the
# internet.
#
# The gateway FQDN is hardcoded because it is stable for the lifetime
# of the Container Apps Environment. If the CAE is recreated, the
# `thankfulbush-7b65c96f` segment will change and this file must be
# updated and the frontend image rebuilt.

# Upstream gateway — internal Container Apps service
upstream arcforge_gateway {
    server ca-arcforge-gateway.internal.thankfulbush-7b65c96f.westus3.azurecontainerapps.io:443;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers (gateway also applies Helmet; defense in depth) ──
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "geolocation=()"    always;

    # ── Long-lived cache for hashed static assets ─────────────────────────
    location ~* \.(?:js|css|woff2?|png|svg|ico|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Service worker — never cache so updates are picked up ─────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── API reverse proxy: /auth/* /metrics/* /export/* /health ───────────
    # All API traffic is forwarded to the internal gateway over HTTPS.
    # The gateway verifies JWTs, applies rate limits, and routes onward
    # to auth/metrics/export.
    location /auth/ {
        proxy_pass         https://arcforge_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_ssl_server_name on;
        proxy_ssl_name     ca-arcforge-gateway.internal.thankfulbush-7b65c96f.westus3.azurecontainerapps.io;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /metrics/ {
        proxy_pass         https://arcforge_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_ssl_server_name on;
        proxy_ssl_name     ca-arcforge-gateway.internal.thankfulbush-7b65c96f.westus3.azurecontainerapps.io;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /export/ {
        proxy_pass         https://arcforge_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_ssl_server_name on;
        proxy_ssl_name     ca-arcforge-gateway.internal.thankfulbush-7b65c96f.westus3.azurecontainerapps.io;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location = /health {
        proxy_pass         https://arcforge_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_ssl_server_name on;
        proxy_ssl_name     ca-arcforge-gateway.internal.thankfulbush-7b65c96f.westus3.azurecontainerapps.io;
    }

    # ── SPA fallback — all other routes serve index.html ──────────────────
    location / {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
