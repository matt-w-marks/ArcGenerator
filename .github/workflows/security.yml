name: Security Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [javascript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit gateway
        run: |
          if [ -f gateway/package-lock.json ]; then
            cd gateway && npm ci && npm audit --audit-level=high
          fi
      - name: Audit auth service
        run: |
          if [ -f services/auth/package-lock.json ]; then
            cd services/auth && npm ci && npm audit --audit-level=high
          fi
      - name: Audit frontend
        run: |
          if [ -f frontend/package-lock.json ]; then
            cd frontend && npm ci && npm audit --audit-level=high
          fi

  pip-audit:
    name: pip Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Audit metrics service
        run: |
          if [ -f services/metrics/requirements.txt ]; then
            pip-audit -r services/metrics/requirements.txt
          fi
      - name: Audit export service
        run: |
          if [ -f services/export/requirements.txt ]; then
            pip-audit -r services/export/requirements.txt
          fi
